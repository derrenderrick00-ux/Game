<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riddle Quiz Game</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            width: 400px;
            text-align: center;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        h1 {
            font-size: 2.5rem;
            color: #3498db;
            margin-bottom: 20px;
            animation: fadeIn 1s ease-in-out;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #2c3e50;
            transition: opacity 0.5s ease;
        }

        button {
            background-color: #3498db;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-size: 1rem;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        button:hover {
            background-color: #2980b9;
            transform: scale(1.05);
        }

        #question-container {
            margin-bottom: 20px;
        }

        #timer {
            font-size: 1.2rem;
            color: #e74c3c;
            margin-top: 10px;
        }

        #answer-container {
            margin: 20px 0;
        }

        #feedback {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            animation: fadeIn 0.5s ease-out;
        }

        .incorrect-feedback {
            color: red;
            font-size: 1.3rem;
        }

        .correct-feedback {
            color: green;
            font-size: 1.3rem;
        }

        .reset-button {
            background-color: #2ecc71;
            color: white;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Riddle Quiz Game</h1>
        <div id="question-container">
            <h2 id="question"></h2>
            <div id="timer"></div>
            <div id="answer-container">
                <!-- Options will be generated here dynamically -->
            </div>
        </div>
        <div id="score-container">
            <h3>Score: <span id="score">0</span></h3>
        </div>
        <div id="feedback"></div>
        <button class="reset-button" id="reset-button" style="display:none;" onclick="resetQuiz()">Play Again</button>
    </div>

    <script>
        const questions = [
            {
                question: "What color is a mirror?",
                ans: ["silver", "reflective", "mirror"],
                correctAnswer: "mirror"
            },
            {
                question: "What is heavier: a pound of feathers or a pound of bricks?",
                ans: ["neither", "they are the same"],
                correctAnswer: "they are the same"
            },
            {
                question: "What has keys but can't open locks?",
                ans: ["a piano", "a car", "a door"],
                correctAnswer: "a piano"
            },
            {
                question: "What runs but never walks?",
                ans: ["water", "a car", "a river"],
                correctAnswer: "water"
            },
            {
                question: "What can you catch but not throw?",
                ans: ["a cold", "a ball", "a fish"],
                correctAnswer: "a cold"
            },
            // Add more riddles here...
        ];

        let score = 0;
        let currentQuestionIndex = 0;
        let totalQuestions = 5;
        let timer;
        let timeLeft = 30; // 30 seconds per question
        let currentQuestion = null;
        let shuffledQuestions = []; // Array to store shuffled questions

        // Prompt the user to select number of questions before starting the quiz
        function promptForQuestions() {
            const userInput = window.prompt("How many questions do you want to answer?", "5");
            if (userInput && !isNaN(userInput) && userInput > 0) {
                totalQuestions = parseInt(userInput);
                startQuiz();
            } else {
                alert("Please enter a valid number of questions.");
                promptForQuestions(); // Retry if invalid input
            }
        }

        // Start the quiz after receiving user input
        function startQuiz() {
            score = 0;
            currentQuestionIndex = 0;
            document.getElementById("score").innerText = score;
            document.getElementById("feedback").innerText = "";
            document.getElementById("reset-button").style.display = "none";

            // Shuffle questions array to randomize order
            shuffleQuestions();

            nextQuestion();
        }

        // Function to shuffle the questions array
        function shuffleQuestions() {
            // Make a copy of the questions array and shuffle it
            shuffledQuestions = [...questions];
            for (let i = shuffledQuestions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledQuestions[i], shuffledQuestions[j]] = [shuffledQuestions[j], shuffledQuestions[i]]; // Swap elements
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex >= totalQuestions) {
                document.getElementById("feedback").innerText = `Quiz over! Your final score is ${score}`;
                document.getElementById("reset-button").style.display = "inline-block";
                return;
            }

            // Get the next question from the shuffled array
            currentQuestion = shuffledQuestions[currentQuestionIndex];

            document.getElementById("question").innerText = currentQuestion.question;
            document.getElementById("feedback").innerText = "";

            // Clear previous answers and start a new set of options
            const answerContainer = document.getElementById("answer-container");
            answerContainer.innerHTML = ""; // Clear any existing options

            // Create buttons for each option
            currentQuestion.ans.forEach(option => {
                const button = document.createElement("button");
                button.innerText = option;
                button.onclick = () => submitAnswer(option);
                answerContainer.appendChild(button);
            });

            startTimer();
            currentQuestionIndex++;
        }

        function startTimer() {
            timeLeft = 30;
            document.getElementById("timer").innerText = `Time: ${timeLeft}s`;

            if (timer) clearInterval(timer);

            timer = setInterval(() => {
                timeLeft--;
                document.getElementById("timer").innerText = `Time: ${timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    document.getElementById("feedback").innerText = "Time's up! 😂😂😂";
                    setTimeout(nextQuestion, 2000); // Move to next question after 2 seconds
                }
            }, 1000);
        }

        function submitAnswer(selectedOption) {
            clearInterval(timer); // Stop the timer when an answer is selected

            // Check if the selected option is correct
            if (selectedOption === currentQuestion.correctAnswer) {
                score++;
                document.getElementById("score").innerText = score;
                document.getElementById("feedback").innerText = `Correct! 🎉 Well done!`;
                document.getElementById("feedback").classList.add("correct-feedback");
            } else {
                document.getElementById("feedback").innerText = `Oops! Wrong answer! 😢 You failed!`;
                document.getElementById("feedback").classList.add("incorrect-feedback");
            }

            setTimeout(nextQuestion, 2000); // Move to the next question after 2 seconds
        }

        function resetQuiz() {
            // Reset the game state and shuffle questions again
            score = 0;
            currentQuestionIndex = 0;
            document.getElementById("score").innerText = score;
            document.getElementById("feedback").innerText = "";
            document.getElementById("reset-button").style.display = "none";
            
            // Shuffle questions again
            shuffleQuestions();
            nextQuestion();
        }

        // Start quiz by prompting the user
        promptForQuestions();
    </script>
</body>
</html>
